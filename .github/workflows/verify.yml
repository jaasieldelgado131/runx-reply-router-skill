name: Verify reply-router

on:
  workflow_dispatch:
    inputs:
      registry_ref:
        description: "Published ref, for example jaasieldelgado131/reply-router@sha-abcdef123456"
        required: false
        default: ""
      publish_registry:
        description: "Publish reply-router to the hosted registry from Linux before dogfood"
        required: false
        default: "false"
  push:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Linux sandbox runtime
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y bubblewrap

      - name: Prepare evidence directories
        run: |
          set -euo pipefail
          mkdir -p evidence receipts

      - name: Record runx version
        run: |
          set -euo pipefail
          npx --yes @runxhq/cli@0.6.14 --version | tee evidence/runx-version.txt

      - name: Inline harness
        env:
          RUNX_RECEIPT_SIGN_KID: runx-demo-key
          RUNX_RECEIPT_SIGN_ED25519_SEED_BASE64: QkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkI=
          RUNX_RECEIPT_SIGN_ISSUER_TYPE: hosted
          RUNX_RECEIPT_DIR: receipts
        run: |
          set -euo pipefail
          npx --yes @runxhq/cli@0.6.14 harness ./skills/reply-router --json | tee evidence/harness.json

      - name: Publish registry package
        if: ${{ github.event.inputs.publish_registry == 'true' }}
        run: |
          set -euo pipefail
          npx --yes @runxhq/cli@0.6.14 registry publish ./skills/reply-router/SKILL.md --registry https://api.runx.ai --version sha-016598c4eb75 --upsert --json | tee evidence/publish.json

      - name: Published registry dogfood
        if: ${{ github.event.inputs.registry_ref != '' }}
        env:
          REGISTRY_REF: ${{ github.event.inputs.registry_ref }}
          RUNX_RECEIPT_SIGN_KID: runx-demo-key
          RUNX_RECEIPT_SIGN_ED25519_SEED_BASE64: QkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkI=
          RUNX_RECEIPT_SIGN_ISSUER_TYPE: hosted
          RUNX_RECEIPT_VERIFY_KID: runx-demo-key
          RUNX_RECEIPT_VERIFY_ED25519_PUBLIC_KEY_BASE64: IVL40Zt5HSRFMkLhXy6rbLfP+ntqXtMAl5YOBpiB2xI=
          RUNX_RECEIPT_DIR: receipts
        run: |
          set -euo pipefail
          npx --yes @runxhq/cli@0.6.14 registry read "$REGISTRY_REF" --registry https://api.runx.ai --json | tee evidence/registry-read.json
          INPUT_JSON="$(node -e 'const fs=require("fs"); const j=JSON.parse(fs.readFileSync("skills/reply-router/fixtures/sealed_unsubscribe_suppression.json","utf8")); process.stdout.write(JSON.stringify(j));')"
          export INPUT_JSON
          npx --yes @runxhq/cli@0.6.14 skill "$REGISTRY_REF" dogfood --registry https://api.runx.ai --input-json inbound_reply="$(node -e 'const j=JSON.parse(process.env.INPUT_JSON); process.stdout.write(JSON.stringify(j.inbound_reply));')" --input-json original_send_receipt="$(node -e 'const j=JSON.parse(process.env.INPUT_JSON); process.stdout.write(JSON.stringify(j.original_send_receipt));')" --input-json suppression_policy="$(node -e 'const j=JSON.parse(process.env.INPUT_JSON); process.stdout.write(JSON.stringify(j.suppression_policy));')" --input-json store_projection="$(node -e 'const j=JSON.parse(process.env.INPUT_JSON); process.stdout.write(JSON.stringify(j.store_projection));')" --receipt-dir receipts --json | tee evidence/dogfood.json
          find receipts -type f -name '*.json' | sort | tee evidence/receipt-files.txt
          DOGFOOD_RECEIPT_ID="$(node -e 'const fs=require("fs"); const j=JSON.parse(fs.readFileSync("evidence/dogfood.json","utf8")); process.stdout.write(j.receipt_id || j.id || "");')"
          test -n "$DOGFOOD_RECEIPT_ID"
          DOGFOOD_RECEIPT_FILE="receipts/${DOGFOOD_RECEIPT_ID}.json"
          npx --yes @runxhq/cli@0.6.14 verify --receipt "$DOGFOOD_RECEIPT_FILE" --json | tee evidence/verification.json

      - name: Copy receipts with portable names
        run: |
          set -euo pipefail
          mkdir -p evidence/receipts
          find receipts -type f -name '*.json' -print0 | while IFS= read -r -d '' file; do
            base="$(basename "$file" | tr ':' '_')"
            cp "$file" "evidence/receipts/$base"
          done

      - name: Upload evidence
        uses: actions/upload-artifact@v4
        with:
          name: reply-router-evidence
          path: evidence/
